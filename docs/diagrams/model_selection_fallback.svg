<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900"><rect width="1400" height="900" fill="#f8fafc"/>
<defs><marker id="a" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0,0 10,4 0,8" fill="#2563eb"/></marker></defs>
<text x="700" y="70" text-anchor="middle" font-size="42" font-family="Arial" font-weight="bold">ML Model Selection &amp; Fallback</text>
<rect x="480" y="120" width="440" height="70" rx="12" fill="#cffafe" stroke="#0891b2"/><text x="700" y="165" text-anchor="middle" font-size="28" font-family="Arial" font-weight="bold">MLStrategy evaluate(symbol, timeframe)</text>
<polygon points="600,260 800,260 900,330 800,400 600,400 500,330" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/><text x="700" y="338" text-anchor="middle" font-size="30" font-family="Arial" font-weight="bold">Candidate exists?</text>
<line x1="900" y1="330" x2="1080" y2="330" stroke="#2563eb" stroke-width="3" marker-end="url(#a)"/><text x="990" y="315" font-size="22" font-family="Arial">yes</text>
<rect x="1060" y="280" width="280" height="100" rx="12" fill="#ecfeff" stroke="#06b6d4"/><text x="1200" y="325" text-anchor="middle" font-size="24" font-family="Arial">Rank candidate</text><text x="1200" y="355" text-anchor="middle" font-size="24" font-family="Arial">validation metrics</text>
<polygon points="1060,470 1240,470 1320,530 1240,590 1060,590 980,530" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/><text x="1150" y="538" text-anchor="middle" font-size="27" font-family="Arial">Quality floor met?</text>
<rect x="1030" y="650" width="250" height="76" rx="10" fill="#dcfce7" stroke="#22c55e"/><text x="1155" y="697" text-anchor="middle" font-size="27" font-family="Arial" font-weight="bold">Use candidate</text>
<rect x="710" y="650" width="250" height="76" rx="10" fill="#fef3c7" stroke="#f59e0b"/><text x="835" y="697" text-anchor="middle" font-size="27" font-family="Arial" font-weight="bold">Use fallback</text>
<line x1="500" y1="330" x2="320" y2="330" stroke="#2563eb" stroke-width="3" marker-end="url(#a)"/><text x="400" y="315" font-size="22" font-family="Arial">no</text>
<polygon points="120,470 300,470 380,530 300,590 120,590 40,530" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/><text x="210" y="538" text-anchor="middle" font-size="24" font-family="Arial">Require symbol model?</text>
<rect x="70" y="650" width="250" height="76" rx="10" fill="#fee2e2" stroke="#ef4444"/><text x="195" y="697" text-anchor="middle" font-size="27" font-family="Arial" font-weight="bold">Force HOLD</text>
<line x1="700" y1="190" x2="700" y2="260" stroke="#2563eb" stroke-width="3" marker-end="url(#a)"/>
<line x1="1200" y1="380" x2="1150" y2="470" stroke="#2563eb" stroke-width="3" marker-end="url(#a)"/>
<line x1="1150" y1="590" x2="1155" y2="650" stroke="#2563eb" stroke-width="3" marker-end="url(#a)"/><text x="1175" y="635" font-size="20" font-family="Arial">yes</text>
<line x1="1030" y1="530" x2="835" y2="650" stroke="#2563eb" stroke-width="3" marker-end="url(#a)"/><text x="940" y="610" font-size="20" font-family="Arial">no</text>
<line x1="210" y1="590" x2="195" y2="650" stroke="#2563eb" stroke-width="3" marker-end="url(#a)"/><text x="145" y="635" font-size="20" font-family="Arial">yes</text>
<line x1="380" y1="530" x2="710" y2="688" stroke="#2563eb" stroke-width="3" marker-end="url(#a)"/><text x="540" y="615" font-size="20" font-family="Arial">no</text>
<rect x="470" y="790" width="460" height="70" rx="12" fill="#dbeafe" stroke="#3b82f6"/><text x="700" y="834" text-anchor="middle" font-size="30" font-family="Arial" font-weight="bold">Emit vote to Ensemble (BUY / SELL / HOLD)</text>
<line x1="1155" y1="726" x2="780" y2="790" stroke="#2563eb" stroke-width="3" marker-end="url(#a)"/>
